<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14120e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Quỷ Cốc Bát Hoang — Tra cứu</title>
<style>
  :root{
    --bg:#14120e; --bg2:#191611; --panel:#1e1a14; --panel2:#28221a; --border:#3a332a;
    --ink:#e8e0d0; --dim:#9a8f7a; --accent:#d4a955; --accent2:#8fb573;
    --red:#c96b5a; --blue:#7aa5c9; --purple:#a98fc9;
    --mono:"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-padding-top:130px}
  body{background:
      radial-gradient(1200px 500px at 80% -10%, #2a2015aa, transparent),
      radial-gradient(900px 400px at -10% 30%, #1d222aA0, transparent),
      var(--bg);
    color:var(--ink);font:15px/1.55 -apple-system,"Segoe UI",Roboto,sans-serif;
    padding-bottom:70px;min-height:100vh}
  header{position:sticky;top:0;z-index:20;background:#14120ef2;backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 12px) 16px 0}
  .brand{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  h1{font-size:19px;color:var(--accent);letter-spacing:.5px;font-weight:700}
  .brand small{color:var(--dim);font-size:12px}
  .ver{margin-left:auto;color:var(--dim);font-size:11px;font-family:var(--mono)}
  #q{width:100%;padding:11px 15px;font-size:16px;border-radius:12px;border:1px solid var(--border);
    background:var(--panel);color:var(--ink);outline:none;transition:border .15s}
  #q:focus{border-color:var(--accent);box-shadow:0 0 0 3px #d4a95522}
  nav{display:flex;gap:4px;margin-top:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  .tab{padding:9px 16px;font-size:13.5px;color:var(--dim);cursor:pointer;user-select:none;
    border-bottom:2px solid transparent;white-space:nowrap;font-weight:600}
  .tab.on{color:var(--accent);border-color:var(--accent)}
  main{max-width:900px;margin:0 auto;padding:16px}
  .note{background:linear-gradient(90deg,#d4a95514,transparent);border:1px solid var(--border);
    border-left:3px solid var(--accent);border-radius:10px;padding:11px 14px;font-size:13.5px;color:var(--dim);margin-bottom:16px}
  .note b{color:var(--ink)}
  section{margin-bottom:24px}
  h2{font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;
    padding-bottom:7px;margin-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  h2 .cnt{color:var(--dim);font-weight:400;letter-spacing:0;text-transform:none;font-size:12px}
  .item{display:grid;grid-template-columns:minmax(120px,38%) 1fr auto;gap:4px 14px;align-items:start;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:7px;
    transition:background .12s, transform .06s}
  .item:hover{background:var(--panel2)}
  .item:active{transform:scale(.995)}
  code{font-family:var(--mono);font-size:13.5px;color:var(--accent2);word-break:break-all}
  .item.cmd code{color:var(--accent)}
  .item.idrow code{color:var(--blue)}
  .name{color:var(--ink);font-weight:600;font-size:14px}
  .desc{color:var(--dim);font-size:13px}
  .desc .vd{display:block;font-size:12px;opacity:.8;margin-top:2px}
  .copy{border:1px solid var(--border);background:#00000030;color:var(--dim);border-radius:8px;
    padding:5px 13px;font-size:12px;cursor:pointer;transition:all .12s;align-self:center}
  .copy:hover{color:var(--accent);border-color:var(--accent)}
  .copy.ok{color:var(--accent2);border-color:var(--accent2)}
  .empty{color:var(--dim);text-align:center;padding:50px 0;display:none}
  mark{background:#d4a95533;color:var(--accent);border-radius:3px;padding:0 1px}
  .more{width:100%;padding:11px;border-radius:10px;border:1px dashed var(--border);background:none;
    color:var(--dim);cursor:pointer;font-size:13.5px;margin-top:4px}
  .more:hover{color:var(--accent);border-color:var(--accent)}
  #builder{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:18px}
  #builder h3{font-size:12.5px;color:var(--dim);margin-bottom:9px;font-weight:600;letter-spacing:.5px}
  #builder .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  #builder select,#builder input{padding:9px 11px;border-radius:9px;border:1px solid var(--border);
    background:var(--panel2);color:var(--ink);font-size:14px;max-width:100%}
  #bval{width:110px}
  #bout{font-family:var(--mono);color:var(--accent);font-size:14px;padding:9px 11px;
    background:#00000040;border-radius:9px;flex:1;min-width:180px;word-break:break-all}
  #updbar{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:50;
    background:var(--accent);color:#14120e;border-radius:12px;padding:12px 16px;display:none;
    align-items:center;gap:12px;font-weight:600;box-shadow:0 8px 30px #00000080}
  #updbar button{margin-left:auto;border:none;background:#14120e;color:var(--accent);
    border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:10px;background:#d4a95522;color:var(--accent);font-weight:600}
  @media(max-width:600px){
    header{padding-left:12px;padding-right:12px}
    h1{font-size:16px}
    main{padding:12px}
    .item{grid-template-columns:1fr auto}
    .item code,.item .name{grid-column:1}
    .item .copy{grid-column:2;grid-row:1;padding:7px 14px}
    .item .desc{grid-column:1/-1}
    #builder .row{flex-direction:column;align-items:stretch}
    #bval{width:100%}
  }
</style>
</head>

 {c:"Nhẫn trữ vật",d:"\"{0} Nhẫn trữ vật\" là đồ nhiệm vụ, KHÔNG đeo được. Bản xịn theo cảnh giới: Thạch chìm giới (Luyện Khí), Kiên nham giới (Trúc Cơ)… spawn hoặc mua phường thị."},
 {c:"Trần chỉ số",d:"Ngộ tính max 200, kỹ nghệ tư chất max 100. Cộng quá trần sẽ bị chặn."},
 {c:"Kho ID (beta)",d:"1.365 ID trích 100% từ data IPA bản Việt hoá (khí vận 700xxx, hiệu ứng, đan dược...). KHÔNG dùng tài liệu bản PC vì đã phát hiện lệch với bản mobile."},
 {c:"Spawn tọa kỵ theo TÊN",d:"Không cần ID — tab \"Tăng thêm đạo cụ\" search: \"Cổ · Thừa hoàng\", \"Cổ · Long ngư\", \"Thừa hoàng\", \"Long ngư\"… là ra item tọa kỵ."},
 {c:"Thần khí",d:"Game có 3 thần khí: Song Ngư Bôi (1), Hạo Thiên Nhãn (2), Luyện Yêu Hồ (3) — dùng shenqi_1/2/3. Nguồn: enum trong data IPA."},
];
/* ================= APP ================= */
const TABS=[["cmd","Lệnh mod"],["key","Thuộc tính"],["cp","Công pháp"],["ids","Kho ID"],["tips","Mẹo"]];
let tab="cmd", idLimit=150, idg="Tất cả";
const HE_ORDER=["Kiếm","Đao","Thương","Quyền","Chưởng","Chỉ","Hỏa","Thủy","Lôi","Phong","Thổ","Mộc","Thân pháp","Khí linh","Pháp bảo"];
const deacc=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D").toLowerCase();
const nav=document.getElementById("tabs"),content=document.getElementById("content"),
      q=document.getElementById("q"),empty=document.getElementById("empty");
TABS.forEach(([id,label])=>{
  const el=document.createElement("div");
  el.className="tab"+(id===tab?" on":"");el.textContent=label;el.dataset.id=id;
  el.onclick=()=>{tab=id;idLimit=150;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.id===id));render();window.scrollTo(0,0)};
  nav.appendChild(el);
});
q.addEventListener("input",()=>{idLimit=150;render()});
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")}
function hi(t,term){if(!term)return esc(t);const dt=deacc(String(t)),i=dt.indexOf(term);if(i<0)return esc(t);
  return esc(String(t).slice(0,i))+"<mark>"+esc(String(t).slice(i,i+term.length))+"</mark>"+esc(String(t).slice(i+term.length));}
function copyBtn(text){return `<button class="copy" data-c="${esc(text).replace(/"/g,"&quot;")}">Copy</button>`}
function render(){
  const term=deacc(q.value.trim());let html="",count=0;
  if(tab==="cmd"){
    html+=`<div class="note"><b>Cách dùng:</b> icon 📖 góc trên trái bản đồ lớn → "Cao cấp mệnh lệnh" → dán lệnh → Chấp hành. <b>Số âm để giảm</b> chỉ số. Tắt keymapping (⌥) trước khi gõ.</div>`;
    const items=CMDS.filter(x=>!term||deacc(x.c+" "+x.d+" "+(x.vd||"")).includes(term));count=items.length;
    const by={};items.forEach(x=>(by[x.g]=by[x.g]||[]).push(x));
    for(const g in by){html+=`<section><h2>${g}<span class="cnt">${by[g].length}</span></h2>`+
      by[g].map(x=>`<div class="item cmd"><code>${hi(x.c,term)}</code><div class="desc">${hi(x.d,term)}${x.vd?`<span class="vd">VD: ${x.vd}</span>`:""}</div>${copyBtn(x.c)}</div>`).join("")+"</section>";}
  }
  if(tab==="key"){
    html+=`<div id="builder"><h3>🛠 TẠO NHANH LỆNH SHUXING</h3><div class="row">
      <select id="bkey">${KEYS.filter(x=>!x.g.startsWith("ID tông môn")&&!x.g.startsWith("Tài nguyên")).map(x=>`<option value="${x.k}">${x.k} — ${x.d}</option>`).join("")}</select>
      <input id="bval" type="number" value="100" step="1">
      <div id="bout">shuxing_hp_100</div><button class="copy" id="bcopy">Copy</button></div></div>`;
    const items=KEYS.filter(x=>!term||deacc(x.k+" "+x.d+" "+x.g).includes(term));count=items.length;
    const by={};items.forEach(x=>(by[x.g]=by[x.g]||[]).push(x));
    for(const g in by){html+=`<section><h2>${g}<span class="cnt">${by[g].length}</span></h2>`+
      by[g].map(x=>`<div class="item"><code>${hi(x.k,term)}</code><div class="desc">${hi(x.d,term)}</div>${copyBtn(g.startsWith("ID")||g.startsWith("Tài")?x.k:"shuxing_"+x.k+"_100")}</div>`).join("")+"</section>";}
  }
  if(tab==="cp"){
    html+=`<div class="note">⚔️ <b>${SKILLS.length} công pháp / khí linh / pháp bảo</b> trích từ data IPA bản Việt hoá, xếp theo hệ. Tên và hiệu ứng nguyên gốc trong game. <span class="badge">BETA</span></div>`;
    const items=SKILLS.filter(x=>!term||deacc(x.id+" "+x.n+" "+x.d+" "+x.k+" "+x.h).includes(term));count=items.length;
    const by={};items.forEach(x=>(by[x.h]=by[x.h]||[]).push(x));
    HE_ORDER.filter(h=>by[h]).forEach(h=>{
      html+=`<section><h2>Hệ ${h}<span class="cnt">${by[h].length}</span></h2>`+
        by[h].map(x=>`<div class="item"><div><span class="badge">${x.k}</span> <span class="name">${hi(x.n,term)}</span></div><div class="desc">${x.d?hi(x.d,term):""}</div>${copyBtn(x.id)}</div>`).join("")+"</section>";
    });
  }
  if(tab==="ids"){
    html+=`<div class="note">🗃 <b>1.365 ID</b> trích 100% từ data IPA bản Việt hoá. Thần khí dùng shenqi_1/2/3 (xem tab Mẹo). <span class="badge">BETA — đang bổ sung</span></div>`;
    const GROUPS=["Tất cả","Khí vận","Đan dược & đạo cụ","Công pháp","Khí linh","Pháp bảo","Trạng thái đặc biệt","Hiệu ứng khác"];
    html+=`<nav style="margin:-6px 0 12px">`+GROUPS.map(g=>`<div class="tab idg ${g===idg?"on":""}" data-g="${g}">${g}</div>`).join("")+`</nav>`;
    const items=GAME_IDS.filter(x=>(idg==="Tất cả"||x.g===idg)&&(!term||deacc(x.id+" "+x.n+" "+x.d).includes(term)));count=items.length;
    html+=`<section><h2>Kết quả<span class="cnt">${count}</span></h2>`+
      items.slice(0,idLimit).map(x=>`<div class="item idrow"><code>${hi(x.id,term)}</code><div><div class="name">${hi(x.n,term)} <span class="badge">${x.g}</span></div>${x.d?`<div class="desc">${hi(x.d,term)}</div>`:""}</div>${copyBtn(x.id)}</div>`).join("");
    if(count>idLimit)html+=`<button class="more" id="moreBtn">Hiện thêm (${count-idLimit} còn lại)</button>`;
    html+="</section>";
  }
  if(tab==="tips"){
    const items=TIPS.filter(x=>!term||deacc(x.c+" "+x.d).includes(term));count=items.length;
    html+=`<section><h2>Mẹo &amp; lưu ý<span class="cnt">${count}</span></h2>`+
      items.map(x=>`<div class="item"><div class="name">${hi(x.c,term)}</div><div class="desc">${hi(x.d,term)}</div></div>`).join("")+"</section>";
  }
  content.innerHTML=html;
  empty.style.display=count?"none":"block";
  const mb=document.getElementById("moreBtn");
  if(mb)mb.onclick=()=>{idLimit+=300;render()};
  if(tab==="key"){
    const bkey=document.getElementById("bkey"),bval=document.getElementById("bval"),bout=document.getElementById("bout");
    const upd=()=>bout.textContent="shuxing_"+bkey.value+"_"+(bval.value||0);
    bkey.onchange=upd;bval.oninput=upd;upd();
    document.getElementById("bcopy").onclick=function(){cp(this,bout.textContent)};
  }
}
content.addEventListener("click",e=>{
  const b=e.target.closest(".copy");
  if(b&&b.dataset.c){cp(b,b.dataset.c);return}
  const g=e.target.closest(".idg");
  if(g){idg=g.dataset.g;idLimit=150;render()}
});
function cp(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent="✓";btn.classList.add("ok");
  setTimeout(()=>{btn.textContent="Copy";btn.classList.remove("ok")},1200)})}
render();
/* ============ PWA + tự cập nhật ============ */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;
      nw&&nw.addEventListener("statechange",()=>{
        if(nw.state==="installed"&&navigator.serviceWorker.controller)
          document.getElementById("updbar").style.display="flex";
      });
    });
    setInterval(()=>reg.update(),60*60*1000);
  });
}
</script>
</body>
</html>
